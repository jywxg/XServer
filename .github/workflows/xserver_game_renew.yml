name: XServer-Game-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      actions: write
      contents: write

    steps:
      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/XServer-Game-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 复制脚本到工作目录
        run: cp private/xserver_game_renew.py xserver_game_renew.py

      - name: 🐍 安装 Python 依赖
        run: pip install requests --quiet

      - name: 🔧 执行续期
        env:
          XSERVER_GAME_ACCOUNT: ${{ secrets.XSERVER_GAME_ACCOUNT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: python3 xserver_game_renew.py

      - name: 🧹 清理旧的工作流运行记录
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"

          runs=$(gh run list \
            --repo "$REPO" \
            --workflow "${{ github.workflow }}" \
            --limit 100 \
            --json databaseId \
            --jq '.[].databaseId')

          count=0
          for run_id in $runs; do
            count=$((count + 1))

            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete "$run_id" --repo "$REPO" || true
            fi
          done
