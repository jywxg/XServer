name: XServer-Game-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/XServer-Game-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 复制脚本到工作目录
        run: cp private/xserver_game_renew.py xserver_game_renew.py

      - name: 🐍 安装 Python 依赖
        run: pip install requests --quiet

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION="v3.1.0"
          echo "📦 GOST 版本: $VERSION"

          wget -q -O gost.tar.gz "https://github.com/go-gost/gost/releases/download/${VERSION}/gost_3.1.0_linux_amd64.tar.gz"
          tar -xzf gost.tar.gz

          chmod +x gost || chmod +x ./gost*

          PROXY="$GOST_PROXY"

          # 支持 Base64 与明文
          if ! echo "$PROXY" | grep -Eq '^(socks5|http|https|vless|vmess|tuic|hy2)://'; then
            DECODED=$(echo "$PROXY" | base64 -d 2>/dev/null || true)
            if echo "$DECODED" | grep -Eq '^(socks5|http|https|vless|vmess|tuic|hy2)://'; then
              PROXY="$DECODED"
              echo "🔓 已自动解码 Base64 代理"
            fi
          fi

          GOST_BIN=$(find . -type f -name 'gost' | head -n1)
          nohup "$GOST_BIN" -L http://:8080 -F "$PROXY" > gost.log 2>&1 &

          sleep 5
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org || cat gost.log

      - name: 🔧 执行续期
        env:
          XSERVER_GAME_ACCOUNT: ${{ secrets.XSERVER_GAME_ACCOUNT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: python3 xserver_game_renew.py
